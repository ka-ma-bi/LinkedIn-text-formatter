<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc33;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#orangeGradient)" filter="url(#shadow)"/>
  
  <!-- LinkedIn 'in' inspired shape -->
  <rect x="40" y="60" width="25" height="80" rx="4" fill="white" opacity="0.95"/>
  <rect x="75" y="60" width="25" height="25" rx="4" fill="white" opacity="0.95"/>
  
  <!-- Text formatting symbols -->
  <g transform="translate(115, 75)">
    <!-- Bold 'B' -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="35" font-weight="bold" fill="white">𝗕</text>
    
    <!-- Italic 'I' -->
    <text x="0" y="35" font-family="Georgia, serif" font-size="35" font-style="italic" fill="white">𝘐</text>
    
    <!-- Underline indicator -->
    <line x1="0" y1="72" x2="25" y2="72" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="45" r="4" fill="white" opacity="0.7"/>
  <circle cx="150" cy="45" r="4" fill="white" opacity="0.7"/>
  <circle cx="50" cy="155" r="4" fill="white" opacity="0.7"/>
  <circle cx="150" cy="155" r="4" fill="white" opacity="0.7"/>
</svg>